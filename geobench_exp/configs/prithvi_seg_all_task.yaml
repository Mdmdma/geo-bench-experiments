experiment:
  generate_experiment_dir: /scratch3/merler/geo-bench-experiments/experiments/prithvi_seg_all
  experiment_name: 1.00x_train_prithvi_v2_seg_all
  benchmark_dir: /scratch3/merler/geo-bench/datasets/segmentation_v1.0
  benchmark_name: segmentation_v1.0
  partition_name: 1.00x_train
  # No ignore_tasks → all 6 segmentation datasets are included:
  # m-cashew-plant, m-chesapeake, m-NeonTree, m-nz-cattle, m-pv4ger-seg, m-SA-crop-type
  num_seeds: 1
  output_dir: null         # set to redirect logs/checkpoints to scratch (different from job metadata dir)
  save_checkpoints: false  # set true to save best-model checkpoint

datamodule:
  _target_: geobench_exp.torch_toolbox.dataset.DataModule
  num_workers: 2
  batch_size: 8
  band_names: "all"
  format: hdf5

trainer:
  _target_: lightning.Trainer
  devices: [0]
  accelerator: gpu
  max_epochs: 100
  max_steps: -1
  limit_val_batches: 1.0
  limit_test_batches: 1.0
  val_check_interval: 1.0
  log_every_n_steps: 5
  enable_progress_bar: true
  precision: 16

wandb:
  project: geo-bench-experiments
  entity: merler
  wandb_group: prithvi_v2_seg_all
  name: prithvi_v2_seg_all
  mode: online
