experiment:
  generate_experiment_dir: /scratch3/merler/geo-bench-experiments/experiments/prithvi_bigearthnet
  experiment_name: 1.00x_train_prithvi_v2_bigearthnet
  benchmark_dir: /scratch3/merler/geo-bench/datasets/classification_v1.0
  benchmark_name: classification_v1.0
  partition_name: 1.00x_train
  ignore_tasks: ["m-bigearthnet"]
  num_seeds: 1

datamodule:
  _target_: geobench_exp.torch_toolbox.dataset.DataModule
  num_workers: 2
  batch_size: 32
  band_names: "all"
  format: hdf5

trainer:
  _target_: lightning.Trainer
  devices: [0]
  accelerator: gpu
  max_epochs: 100
  max_steps: -1
  limit_val_batches: 1.0
  limit_test_batches: 1.0
  val_check_interval: 1.0
  log_every_n_steps: 5
  enable_progress_bar: true

wandb:
  project: geo-bench-experiments
  entity: merler
  wandb_group: prithvi_v2_bigearthnet
  name: prithvi_eo_v2_100_tl_bigearthnet
  mode: online
